<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/banana.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>Banana Slides | AI-native PPT Generator</title>
  </head>
  <body>
    <script>
      // Applique le thème avant le premier paint pour éviter le flash clair→sombre.
      // Défaut app = sombre (pas 'system') ; miroir de useTheme.ts.
      (function () {
        try {
          var stored = localStorage.getItem('banana-slides-theme');
          if (stored === 'light') return;
          if (stored === 'system' && !window.matchMedia('(prefers-color-scheme: dark)').matches) return;
          document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
